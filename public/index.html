<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>감정 기록 도구</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;width:100%}
body{font-family:'Gowun Dodum',sans-serif;background:#f8f7f4;color:#2c2c2a;min-height:100vh;padding:2rem 1rem;overflow-x:hidden}
.app{max-width:620px;margin:0 auto;width:100%}
.header{margin-bottom:2rem}
.header h1{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:300;margin-bottom:0.5rem;letter-spacing:-0.01em}
.header p{font-size:14px;color:#888780;line-height:1.75}
.card{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;padding:1.25rem;margin-bottom:1.25rem;overflow:hidden}
.section-label{font-size:11px;font-weight:500;color:#888780;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.875rem}
textarea{width:100%;min-height:130px;padding:0.75rem 1rem;font-family:'Gowun Dodum',sans-serif;font-size:14px;line-height:1.8;border:0.5px solid #d3d1c7;border-radius:8px;background:#fff;color:#2c2c2a;resize:vertical;margin-bottom:0.5rem;-webkit-appearance:none}
textarea:focus{outline:none;border-color:#888780}
textarea::placeholder{color:#b4b2a9}
.char-count{font-size:11px;color:#b4b2a9;text-align:right;margin-bottom:1rem}
.char-count.ok{color:#1D9E75}
.btn-row{display:flex;gap:0.5rem;margin-top:0.5rem}
button{padding:0.65rem 1.25rem;font-family:'Gowun Dodum',sans-serif;font-size:13px;border-radius:8px;cursor:pointer;transition:all 0.15s;-webkit-appearance:none}
.btn-primary{flex:1;background:#2c2c2a;color:#f8f7f4;border:none}
.btn-primary:hover{background:#444441}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed}
.btn-secondary{background:transparent;color:#888780;border:0.5px solid #d3d1c7}
.btn-secondary:hover{background:#f1efe8}
.btn-small{padding:0.5rem 1rem;font-size:12px}
.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.4s ease}

/* 진행 바 */
.progress-wrap{margin-bottom:1.5rem}
.progress-days{display:flex;gap:0.4rem;margin-bottom:0.5rem}
.day-dot{flex:1;height:8px;border-radius:4px;background:#e8e6de}
.day-dot.done{background:#1D9E75}
.day-dot.today{background:#378ADD}
.progress-text{font-size:12px;color:#888780}
.progress-text span{color:#2c2c2a;font-weight:500}

/* 오늘 이미 기록 */
.already-msg{background:#e1f5ee;border-radius:8px;padding:1rem;font-size:13px;color:#085041;line-height:1.75;margin-bottom:1rem}

/* 오늘 결과 */
.today-result{margin-top:1.25rem;animation:fadeIn 0.4s ease}
.colormap{height:44px;border-radius:8px;overflow:hidden;display:flex;margin-bottom:0.625rem}
.colormap-seg{height:100%}
.emo-labels{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem}
.emo-tag{display:flex;align-items:center;gap:5px;font-size:12px;color:#5f5e5a}
.emo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bar-row{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem}
.bar-label{font-size:12px;width:48px;flex-shrink:0;text-align:right;color:#2c2c2a}
.bar-track{flex:1;height:6px;background:#f1efe8;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;width:0;transition:width 0.7s ease}
.bar-pct{font-size:11px;color:#888780;width:28px;flex-shrink:0}
.insight-box{background:#f8f7f4;border-radius:8px;padding:0.875rem 1rem;margin-top:1rem;border:0.5px solid #d3d1c7}
.insight-box p{font-size:13px;line-height:1.8;color:#5f5e5a}

/* 코드 입력 */
.code-section{margin-top:1.5rem;padding-top:1.5rem;border-top:0.5px solid #e8e6de}
.code-label{font-size:12px;color:#b4b2a9;margin-bottom:0.5rem;text-align:center}
.code-input-wrap{display:flex;gap:0.5rem}
.code-input{flex:1;padding:0.65rem 1rem;font-family:'Gowun Dodum',sans-serif;font-size:18px;letter-spacing:0.4em;text-align:center;border:0.5px solid #d3d1c7;border-radius:8px;background:#fff;color:#2c2c2a;-webkit-appearance:none}
.code-input:focus{outline:none;border-color:#888780}
.code-error{font-size:12px;color:#993c1d;margin-top:0.4rem;text-align:center;display:none}

/* 전체 결과 화면 */
.result-section{display:none}
.result-section.visible{display:block;animation:fadeIn 0.4s ease}
.day-card{background:#fafaf8;border:0.5px solid #e8e6de;border-radius:8px;padding:0.875rem 1rem;margin-bottom:0.625rem}
.day-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.625rem}
.day-num{font-size:12px;color:#888780}
.day-dominant{font-size:13px;font-weight:500;color:#2c2c2a}
.day-colormap{height:10px;border-radius:5px;overflow:hidden;display:flex}
.day-colormap-seg{height:100%}
.trend-emo-row{margin-bottom:1.25rem}
.trend-emo-label{font-size:12px;color:#5f5e5a;margin-bottom:0.375rem;display:flex;align-items:center;gap:6px}
.trend-emo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.trend-bars{display:flex;gap:4px;align-items:flex-end;height:60px}
.trend-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.trend-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px}
.trend-bar-label{font-size:9px;color:#b4b2a9}
.summary-card{background:#f8f7f4;border:0.5px solid #d3d1c7;border-radius:10px;padding:1rem 1.125rem}
.summary-card p{font-size:13px;line-height:1.8;color:#5f5e5a}
.summary-card .hl{color:#2c2c2a;font-weight:500}
.error-msg{background:#faece7;border:0.5px solid #e8a08a;border-radius:8px;padding:0.75rem 1rem;font-size:13px;color:#993c1d;margin-bottom:1rem;display:none}

@media(max-width:480px){
  body{padding:1.5rem 0.75rem}
  .header h1{font-size:20px}
  .card{padding:1rem}
  textarea{min-height:110px;font-size:13px}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>감정 기록 도구</h1>
    <p>반려동물과의 건강한 이별 준비 프로그램</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <!-- 메인 화면 -->
  <div id="mainSection">
    <div class="card">
      <div class="progress-wrap">
        <div class="progress-days" id="progressDays"></div>
        <div class="progress-text" id="progressText"></div>
      </div>

      <!-- 오늘 이미 기록한 경우 -->
      <div id="alreadyMsg" class="already-msg hidden">
        오늘은 이미 기록을 남기셨어요. 내일 다시 접속해 주세요 🌿
      </div>

      <!-- 기록 폼 -->
      <div id="recordForm">
        <div class="section-label">오늘의 감정을 기록해주세요</div>
        <p style="font-size:13px;color:#5f5e5a;line-height:1.75;margin-bottom:1rem">1회기에서 나눴던 내용을 떠올리며, 반려동물과의 이별에 대해 지금 느끼는 감정을 자유롭게 써주세요.</p>
        <textarea id="textInput" placeholder="오늘 반려동물을 생각했을 때 어떤 감정이 드셨나요? 떠오르는 생각이나 느낌을 자유롭게 적어주세요." oninput="countChars()"></textarea>
        <div class="char-count" id="charCount">0 / 최소 50자</div>
        <div class="btn-row">
          <button class="btn-primary" id="recordBtn" onclick="submitRecord()">오늘 기록 저장하기</button>
        </div>
      </div>

      <!-- 오늘 결과 (저장 직후 표시) -->
      <div id="todayResult" class="today-result hidden">
        <div class="section-label" style="margin-top:1.25rem;padding-top:1.25rem;border-top:0.5px solid #e8e6de">오늘의 감정</div>
        <div class="colormap" id="todayColormap"></div>
        <div class="emo-labels" id="todayLabels"></div>
        <div id="todayBars"></div>
        <div class="insight-box">
          <p id="todayInsight"></p>
        </div>
      </div>
    </div>

    <!-- 코드 입력 -->
    <div class="code-section">
      <div class="code-label">2회기 진행자 코드 입력</div>
      <div class="code-input-wrap">
        <input type="number" class="code-input" id="codeInput" placeholder="ㆍㆍㆍㆍ">
        <button class="btn-secondary btn-small" onclick="checkCode()">확인</button>
      </div>
      <div class="code-error" id="codeError">코드가 올바르지 않아요.</div>
    </div>
  </div>

  <!-- 전체 결과 화면 -->
  <div class="result-section" id="resultSection">
    <div class="card">
      <div class="section-label">일별 감정 기록</div>
      <div id="dayCards"></div>
    </div>

    <div class="card">
      <div class="section-label">감정별 변화 추이</div>
      <div id="trendWrap"></div>
    </div>

    <div class="card">
      <div class="section-label">전체 요약</div>
      <div id="weeklySummary" class="summary-card"></div>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" onclick="closeResult()">돌아가기</button>
    </div>
  </div>
</div>

<script>
var EMO_COLORS={'슬픔':'#7F77DD','불안':'#D85A30','그리움':'#1D9E75','죄책감':'#BA7517','두려움':'#D4537E','사랑':'#5DCAA5','평온':'#378ADD'};
var STORAGE_KEY='pet_loss_records';

function getRecords(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch(e){return [];}}
function saveRecords(r){localStorage.setItem(STORAGE_KEY,JSON.stringify(r));}
function getTodayStr(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}

function countChars(){
  var len=document.getElementById('textInput').value.length;
  var el=document.getElementById('charCount');
  el.textContent=len+' / 최소 50자';
  el.className='char-count'+(len>=50?' ok':'');
}

function renderProgress(){
  var records=getRecords();
  var days=document.getElementById('progressDays');
  var text=document.getElementById('progressText');
  days.innerHTML='';
  for(var i=0;i<7;i++){
    var dot=document.createElement('div');
    dot.className='day-dot';
    if(i<records.length)dot.className+=' done';
    else if(i===records.length)dot.className+=' today';
    days.appendChild(dot);
  }
  text.innerHTML='<span>'+records.length+'/7일</span> 기록 완료';
}

function initPage(){
  var records=getRecords();
  var today=getTodayStr();
  var alreadyToday=records.length>0&&records[records.length-1].date===today;
  renderProgress();
  if(alreadyToday){
    document.getElementById('alreadyMsg').classList.remove('hidden');
    document.getElementById('recordForm').classList.add('hidden');
    // 오늘 기록 결과 보여주기
    var todayRecord=records[records.length-1];
    showTodayResult(todayRecord);
  }else{
    document.getElementById('alreadyMsg').classList.add('hidden');
    document.getElementById('recordForm').classList.remove('hidden');
    document.getElementById('todayResult').classList.add('hidden');
  }
}

function showError(msg){
  var el=document.getElementById('errorMsg');
  el.textContent=msg;
  el.style.display='block';
  setTimeout(function(){el.style.display='none';},4000);
}

function showTodayResult(data){
  var sorted=Object.entries(data.emotions).sort(function(a,b){return b[1]-a[1]}).filter(function(e){return e[1]>0});
  var total=sorted.reduce(function(s,e){return s+e[1]},0)||1;

  // 컬러맵
  var cm=document.getElementById('todayColormap');
  cm.innerHTML='';
  sorted.forEach(function(e){
    var seg=document.createElement('div');
    seg.className='colormap-seg';
    seg.style.cssText='width:'+(e[1]/total*100).toFixed(1)+'%;background:'+(EMO_COLORS[e[0]]||'#888780');
    cm.appendChild(seg);
  });

  // 라벨
  document.getElementById('todayLabels').innerHTML=
    sorted.map(function(e){return '<div class="emo-tag"><div class="emo-dot" style="background:'+(EMO_COLORS[e[0]]||'#888780')+'"></div><span>'+e[0]+' '+e[1]+'%</span></div>';}).join('');

  // 바 차트
  var bars=document.getElementById('todayBars');
  bars.innerHTML='';
  sorted.forEach(function(e){
    var row=document.createElement('div');
    row.className='bar-row';
    row.innerHTML='<div class="bar-label">'+e[0]+'</div><div class="bar-track"><div class="bar-fill" style="background:'+(EMO_COLORS[e[0]]||'#888780')+'"></div></div><div class="bar-pct">'+e[1]+'%</div>';
    bars.appendChild(row);
    setTimeout(function(fill,v){fill.style.width=v+'%';}(row.querySelector('.bar-fill'),e[1]),100);
  });

  // 인사이트
  if(data.insight){
    document.getElementById('todayInsight').textContent=data.insight;
  }

  document.getElementById('todayResult').classList.remove('hidden');
}

function submitRecord(){
  var text=document.getElementById('textInput').value.trim();
  if(text.length<50){showError('최소 50자 이상 작성해주세요.');return;}
  var btn=document.getElementById('recordBtn');
  btn.disabled=true;
  btn.textContent='저장 중...';

  fetch('/api/analyze',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text:text})
  })
  .then(function(res){return res.json();})
  .then(function(parsed){
    if(parsed.error)throw new Error(parsed.error);
    var records=getRecords();
    var newRecord={date:getTodayStr(),day:records.length+1,emotions:parsed.emotions,dominant:parsed.dominant,insight:parsed.insight};
    records.push(newRecord);
    saveRecords(records);
    document.getElementById('textInput').value='';
    document.getElementById('charCount').textContent='0 / 최소 50자';
    document.getElementById('charCount').className='char-count';
    btn.disabled=false;
    btn.textContent='오늘 기록 저장하기';
    // 폼 숨기고 결과 보여주기
    document.getElementById('recordForm').classList.add('hidden');
    document.getElementById('alreadyMsg').classList.remove('hidden');
    showTodayResult(newRecord);
    renderProgress();
  })
  .catch(function(e){
    btn.disabled=false;
    btn.textContent='오늘 기록 저장하기';
    showError('오류가 발생했어요. 잠시 후 다시 시도해주세요.');
  });
}

function checkCode(){
  var code=document.getElementById('codeInput').value.trim();
  var err=document.getElementById('codeError');

  fetch('/api/verify',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({code:code})
  })
  .then(function(res){return res.json();})
  .then(function(data){
    if(data.success){
      err.style.display='none';
      showResult();
    }else{
      err.style.display='block';
    }
  })
  .catch(function(){
    err.style.display='block';
  });
}

function showResult(){
  var records=getRecords();
  if(records.length===0){showError('아직 기록된 데이터가 없어요.');return;}
  document.getElementById('mainSection').style.display='none';
  var rs=document.getElementById('resultSection');
  rs.style.display='block';
  rs.classList.add('visible');
  renderDayCards(records);
  renderTrend(records);
  renderSummary(records);
  window.scrollTo(0,0);
}

function renderDayCards(records){
  var wrap=document.getElementById('dayCards');
  wrap.innerHTML='';
  records.forEach(function(r){
    var sorted=Object.entries(r.emotions).sort(function(a,b){return b[1]-a[1]}).filter(function(e){return e[1]>0});
    var total=sorted.reduce(function(s,e){return s+e[1]},0)||1;
    var cm=sorted.map(function(e){return '<div class="day-colormap-seg" style="width:'+(e[1]/total*100).toFixed(1)+'%;background:'+(EMO_COLORS[e[0]]||'#888780')+'"></div>';}).join('');
    wrap.innerHTML+='<div class="day-card"><div class="day-card-header"><span class="day-num">'+r.day+'일차</span><span class="day-dominant">주된 감정: '+r.dominant+'</span></div><div class="day-colormap">'+cm+'</div></div>';
  });
}

function renderTrend(records){
  var wrap=document.getElementById('trendWrap');
  wrap.innerHTML='';
  var emos=['슬픔','불안','그리움','죄책감','두려움','사랑','평온'];
  emos.forEach(function(emo){
    var vals=records.map(function(r){return r.emotions[emo]||0;});
    if(!vals.some(function(v){return v>0;}))return;
    var maxVal=Math.max.apply(null,vals)||1;
    var bars=vals.map(function(v,i){
      var h=Math.max((v/maxVal*54),2);
      return '<div class="trend-bar-wrap"><div class="trend-bar" style="height:'+h+'px;background:'+(EMO_COLORS[emo]||'#888780')+'"></div><div class="trend-bar-label">'+(i+1)+'일</div></div>';
    }).join('');
    wrap.innerHTML+='<div class="trend-emo-row"><div class="trend-emo-label"><div class="trend-emo-dot" style="background:'+(EMO_COLORS[emo]||'#888780')+'"></div>'+emo+'</div><div class="trend-bars">'+bars+'</div></div>';
  });
}

function renderSummary(records){
  var emos=['슬픔','불안','그리움','죄책감','두려움','사랑','평온'];
  var totals={};
  emos.forEach(function(e){totals[e]=0;});
  records.forEach(function(r){emos.forEach(function(e){totals[e]+=(r.emotions[e]||0);});});
  var top3=Object.entries(totals).sort(function(a,b){return b[1]-a[1]}).slice(0,3).filter(function(e){return e[1]>0});
  var top3text=top3.map(function(e){return '<span class="hl">'+e[0]+'</span>';}).join(', ');

  var changeText='';
  if(records.length>=2){
    var neg=['슬픔','불안','죄책감','두려움'];
    var first=neg.reduce(function(s,e){return s+(records[0].emotions[e]||0);},0);
    var last=neg.reduce(function(s,e){return s+(records[records.length-1].emotions[e]||0);},0);
    var diff=first-last;
    if(diff>10)changeText='<p style="margin-top:0.5rem">첫날에 비해 부정 감정이 <span class="hl">'+diff+'%p 감소</span>했어요.</p>';
    else if(diff<-10)changeText='<p style="margin-top:0.5rem">첫날에 비해 부정 감정이 <span class="hl">'+Math.abs(diff)+'%p 증가</span>했어요.</p>';
    else changeText='<p style="margin-top:0.5rem">전체적으로 감정 변화가 <span class="hl">안정적</span>이었어요.</p>';
  }
  document.getElementById('weeklySummary').innerHTML='<p>가장 많이 느낀 감정은 '+top3text+' 이에요.</p>'+changeText;
}

function closeResult(){
  document.getElementById('resultSection').classList.remove('visible');
  document.getElementById('resultSection').style.display='none';
  document.getElementById('mainSection').style.display='block';
  document.getElementById('codeInput').value='';
  window.scrollTo(0,0);
}

document.addEventListener('DOMContentLoaded',function(){
  initPage();
  document.getElementById('codeInput').addEventListener('keydown',function(e){if(e.key==='Enter')checkCode();});
});
</script>
</body>
</html>
